<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Covo - リカバリーパネル</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #1e1f22; }
    /* カスタムスクロールバー */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.5); }
    .material-card {
      background: #2b2d31;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      border-radius: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .material-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#5865F2', 600: '#4752C4' },
            dark: { 900: '#1e1f22', 800: '#2b2d31', 700: '#313338' }
          }
        }
      }
    }
  </script>
</head>
<body class="text-gray-200 min-h-screen flex flex-col items-center justify-center p-6 selection:bg-brand-500 selection:text-white">
  
  <div class="max-w-3xl w-full flex flex-col gap-6">
    
    <!-- ヘッダー -->
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-dark-800 rounded-2xl flex items-center justify-center shadow-lg border border-white/5">
          <i class="fa-solid fa-wrench text-xl text-brand-500"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white tracking-wide">リカバリーパネル</h1>
          <p class="text-sm text-gray-400 mt-0.5">アプリのトラブル修復とバージョン管理</p>
        </div>
      </div>
      <button onclick="checkNormalMode()" class="px-4 py-2.5 bg-dark-800 hover:bg-dark-700 active:scale-95 text-gray-200 font-medium text-sm rounded-xl shadow-md border border-white/5 transition-all flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> 通常モードへ戻る
      </button>
    </div>

    <!-- クイックアクションパネル -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      
      <!-- アップデート -->
      <div class="material-card p-5 flex flex-col justify-between group cursor-default">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <i class="fa-solid fa-cloud-arrow-up text-xl text-brand-500 group-hover:scale-110 transition-transform"></i>
            <h2 class="text-base font-bold text-gray-100">最新アップデートを適用</h2>
          </div>
          <p class="text-xs text-gray-400 mb-4">最新バージョンをダウンロードして修復します。</p>
        </div>
        <button onclick="triggerUpdateCheck()" id="btnUpdateCheck" class="w-full py-2 px-4 bg-brand-500 hover:bg-brand-600 active:bg-brand-600 text-white font-medium text-sm rounded-lg shadow transition-colors flex items-center justify-center gap-2">
          実行する
        </button>
      </div>

      <!-- キャッシュクリア -->
      <div class="material-card p-5 flex flex-col justify-between group cursor-default">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <i class="fa-solid fa-broom text-xl text-emerald-500 group-hover:scale-110 transition-transform"></i>
            <h2 class="text-base font-bold text-gray-100">キャッシュのクリア</h2>
          </div>
          <p class="text-xs text-gray-400 mb-4">設定や一時データをリセットして再起動します。</p>
        </div>
        <button onclick="triggerCacheClearAndRestart()" id="btnCacheClear" class="w-full py-2 px-4 bg-dark-700 hover:bg-dark-900 active:bg-dark-900 text-white font-medium text-sm rounded-lg shadow transition-colors flex items-center justify-center gap-2 border border-white/5">
          実行する
        </button>
      </div>

    </div>

    <!-- 過去バージョン -->
    <div class="material-card p-5 flex flex-col h-72">
      <div class="flex items-center justify-between mb-3 pb-3 border-b border-white/5">
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-clock-rotate-left text-amber-500"></i>
          <h2 class="text-sm font-bold text-gray-200">過去のバージョンへ戻す</h2>
        </div>
        <button onclick="loadPastReleases()" class="text-gray-400 hover:text-white transition-colors">
          <i class="fa-solid fa-rotate text-sm"></i>
        </button>
      </div>
      <div id="releasesContainer" class="flex-1 overflow-y-auto pr-2 space-y-2">
        <div class="h-full flex flex-col items-center justify-center text-gray-500 text-xs">
          <i class="fa-solid fa-spinner fa-spin text-lg mb-2 text-brand-500"></i>
          読み込み中...
        </div>
      </div>
    </div>

    <!-- コンソールログ -->
    <div class="bg-black/40 rounded-xl p-3 font-mono text-xs text-gray-400 h-28 flex flex-col border border-white/5 shadow-inner">
      <div class="flex items-center justify-between border-b border-white/5 pb-1 mb-1">
        <span class="font-bold">System Log</span>
        <span id="consoleStatus" class="text-emerald-500">Standby</span>
      </div>
      <div id="logConsole" class="flex-1 overflow-y-auto space-y-0.5 break-all select-all">
        <div class="text-brand-500">Recovery panel initialized.</div>
      </div>
    </div>

    <!-- フッター -->
    <div class="flex items-center justify-between text-xs text-gray-500 px-1">
      <span>Covo Recovery Engine</span>
      <div class="flex items-center gap-4">
        <button onclick="openLogFolder()" class="hover:text-gray-300 transition-colors">ログフォルダ</button>
        <button onclick="forceQuitApp()" class="text-rose-500 hover:text-rose-400 transition-colors">強制終了</button>
      </div>
    </div>

  </div>

  <script>
    const invoke = window.__TAURI__?.core?.invoke;
    const listen = window.__TAURI__?.event?.listen;

    function logMessage(text, isError = false) {
      const consoleElem = document.getElementById("logConsole");
      const div = document.createElement("div");
      div.className = isError ? "text-rose-400" : "text-gray-300";
      div.innerText = `> ${text}`;
      consoleElem.appendChild(div);
      consoleElem.scrollTop = consoleElem.scrollHeight;
      document.getElementById("consoleStatus").innerText = isError ? "Error" : "Active";
    }

    async function triggerUpdateCheck() {
      const btn = document.getElementById("btnUpdateCheck");
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 照合中...`;
      logMessage("Checking for updates...");
      try {
        if (!invoke) throw new Error("Tauri API not found.");
        const metadata = await invoke('plugin:updater|check');
        if (metadata && metadata.available) {
          logMessage(`Found v${metadata.version}. Downloading...`);
          btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ダウンロード中...`;
          await invoke('plugin:updater|download_and_install', { onEvent: (e) => logMessage(`Progress: ${JSON.stringify(e)}`) });
          logMessage("Update complete. Restarting...");
          btn.innerHTML = `完了 (再起動)`;
          setTimeout(() => invoke('plugin:process|restart'), 1500);
        } else {
          logMessage("No updates available.");
          btn.innerHTML = `更新なし`;
          setTimeout(() => { btn.disabled = false; btn.innerHTML = `実行する`; }, 3000);
        }
      } catch (err) {
        logMessage(`Error: ${err.message || err}`, true);
        btn.disabled = false;
        btn.innerHTML = `失敗 (再試行)`;
      }
    }

    async function triggerCacheClearAndRestart() {
      logMessage("Clearing cache...");
      localStorage.removeItem("covo_use_d1");
      logMessage("Cache cleared. Restarting...");
      if (invoke) {
        setTimeout(() => invoke('plugin:process|restart'), 1000);
      } else {
        setTimeout(() => window.location.href = "http://tauri.localhost", 1000);
      }
    }

    function checkNormalMode() {
      logMessage("Returning to normal mode...");
      
      // ウィンドウタイトルを「Covo」に戻す
      if (window.__TAURI__ && window.__TAURI__.window && window.__TAURI__.window.getCurrentWindow) {
        window.__TAURI__.window.getCurrentWindow().setTitle("Covo").catch(e => console.warn(e));
      } else if (invoke) {
        invoke('plugin:window|set_title', { title: "Covo" }).catch(e => console.warn(e));
      }

      window.location.href = "http://tauri.localhost";
      setTimeout(() => {
        logMessage("⚠️ Navigation failed.", true);
      }, 3000);
    }

    function openLogFolder() {
      if (invoke) invoke('open_log_dir').catch(e => logMessage(`Error: ${e}`, true));
    }

    function forceQuitApp() {
      if (invoke) invoke('plugin:process|exit', { code: 0 });
    }

    async function loadPastReleases() {
      const container = document.getElementById("releasesContainer");
      container.innerHTML = `<div class="h-full flex items-center justify-center text-gray-500 text-xs"><i class="fa-solid fa-spinner fa-spin mr-2 text-brand-500"></i>読み込み中...</div>`;
      logMessage("Fetching past releases...");
      try {
        const res = await fetch("https://api.github.com/repos/qwertyuiop1229/Covo/releases");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const releases = await res.json();
        
        container.innerHTML = "";
        if (!releases || releases.length === 0) {
          container.innerHTML = `<div class="p-4 text-center text-gray-500 text-xs">リリースが見つかりません。</div>`;
          return;
        }

        releases.forEach((rel) => {
          const exeAsset = rel.assets.find(a => a.name.endsWith(".exe"));
          const downloadUrl = exeAsset ? exeAsset.browser_download_url : null;
          const pubDate = new Date(rel.published_at).toLocaleDateString("ja-JP");

          const div = document.createElement("div");
          div.className = "bg-dark-800 border border-white/5 rounded-lg p-2.5 flex items-center justify-between";
          div.innerHTML = `
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-gray-200">${rel.tag_name}</span>
                ${rel.prerelease ? `<span class="px-1 py-0.5 bg-amber-500/20 text-amber-500 text-[9px] rounded">Pre</span>` : ''}
              </div>
              <p class="text-[10px] text-gray-500 mt-0.5">${pubDate} ${exeAsset ? `• ${(exeAsset.size / (1024*1024)).toFixed(1)}MB` : ''}</p>
            </div>
            <button onclick="installPastVersion('${downloadUrl}', '${rel.tag_name}')" ${!downloadUrl ? 'disabled' : ''} id="btn-install-${rel.tag_name}" class="px-3 py-1.5 bg-dark-700 hover:bg-dark-900 border border-white/5 disabled:opacity-50 text-gray-200 text-xs rounded-md shadow transition-colors flex items-center gap-1.5 flex-shrink-0">
              インストール
            </button>
          `;
          container.appendChild(div);
        });
      } catch (e) {
        logMessage(`Fetch error: ${e.message || e}`, true);
        container.innerHTML = `<div class="p-4 text-center text-rose-400 text-xs">取得失敗</div>`;
      }
    }

    async function installPastVersion(url, tag) {
      if (!url || url === 'null') return;
      const btn = document.getElementById(`btn-install-${tag}`);
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
      }
      logMessage(`Downloading ${tag}...`);

      try {
        if (!invoke) throw new Error("Tauri API missing.");
        await invoke('silent_install_past_version', { url: url, tag: tag });
        logMessage(`Installing ${tag}...`);
        if (btn) btn.innerHTML = `復旧中...`;
      } catch (err) {
        logMessage(`Install error: ${err.message || err}`, true);
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = `失敗`;
        }
      }
    }

    if (listen) {
      listen('download-progress', (event) => {
        const data = event.payload;
        if (data) {
          const btn = document.getElementById(`btn-install-${data.tag}`);
          if (btn) btn.innerHTML = `${data.progress}%`;
          logMessage(`[${data.tag}] ${data.progress}%`);
        }
      });
    }

    loadPastReleases();
  </script>
</body>
</html>
